<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>QR Code 掃描器</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

#reader {
    width: 320px;
    margin: 30px auto;
    border-radius: 15px;
    overflow: hidden;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    color: green;
    word-break: break-all;
}
</style>
</head>

<body>

<h2>🔍 QR Code 掃描</h2>

<div id="reader"></div>

<button onclick="toggleCamera()">開啟掃描</button>

<div id="result">尚未掃描</div>

<script>
let qr = null;
let isRunning = false;

function toggleCamera() {
    if (!isRunning) {
        startScan();
    } else {
        stopScan();
    }
}

function startScan() {
    qr = new Html5Qrcode("reader");

    qr.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (decodedText) => {
            document.getElementById("result").innerText = "掃描結果：\n" + decodedText;
        },
        (errorMessage) => {
            // 忽略錯誤
        }
    ).then(() => {
        isRunning = true;
        document.querySelector("button").innerText = "關閉掃描";
    }).catch(err => {
        alert("無法開啟攝影機：" + err);
    });
}

function stopScan() {
    if (qr) {
        qr.stop().then(() => {
            isRunning = false;
            document.querySelector("button").innerText = "開啟掃描";
            document.getElementById("reader").innerHTML = "";
        });
    }
}
</script>

</body>
</html>
