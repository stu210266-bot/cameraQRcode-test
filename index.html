<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>QR Code 掃描器</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

#reader {
    width: 300px;
    margin: auto;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #28a745;
    color: white;
}

#result {
    font-size: 20px;
    margin-top: 15px;
    color: blue;
    word-break: break-all;
}
</style>
</head>

<body>

<h2>🔍 QR Code 掃描器</h2>

<div id="reader"></div>

<button onclick="startScan()">開始掃描</button>
<button onclick="stopScan()">停止掃描</button>

<div id="result">尚未掃描</div>

<script>
let qr;

function startScan() {
    qr = new Html5Qrcode("reader");

    qr.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (decodedText) => {
            document.getElementById("result").innerText = "掃描結果：\n" + decodedText;
        },
        (errorMessage) => {
            // 忽略錯誤
        }
    ).catch(err => {
        alert("無法開啟攝影機：" + err);
    });
}

function stopScan() {
    if (qr) {
        qr.stop().then(() => {
            document.getElementById("result").innerText = "已停止掃描";
        });
    }
}
</script>

</body>
</html>
